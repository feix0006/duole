name: Build APK

# 触发事件：当代码 push 到 main 分支或创建 pull request 时运行
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# 作业定义
jobs:
  build:
    # 在最新的 Ubuntu 虚拟机上运行
    runs-on: ubuntu-latest

    # 构建步骤
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK 11（Android 开发常见版本）
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'adopt'

      # 3. 设置 Android SDK（可选，如果需要特定版本）
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 4. 缓存 Gradle 依赖（加速构建）
      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5. 构建项目（运行 Gradle 的 assembleDebug 任务，生成调试 APK）
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # 6. 上传生成的 APK 文件作为构件
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
