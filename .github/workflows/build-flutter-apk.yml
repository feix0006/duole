name: Build Flutter APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 设置 Flutter 环境（自动安装 SDK）
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.2'  # 需与 pubspec.yaml 中版本一致

    # 安装项目依赖
    - name: Install dependencies
      run: flutter pub get

    # 修复 Android 构建权限问题
    - name: Grant Gradle permission
      run: chmod +x android/gradlew  # 关键点：路径为 android/gradlew

    # 构建 APK（release 模式）
    - name: Build APK
      run: flutter build apk --release

    # 上传生成的 APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release.apk
        path: build/app/outputs/flutter-apk/app-release.apk  # Flutter 默认输出路径
