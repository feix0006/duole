name: Build Flutter APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 设置 Flutter 环境
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.2'  # 使用你的项目 Flutter 版本（见 pubspec.yaml）

    # 解决 Flutter 项目权限问题
    - name: Grant Gradle permission
      run: chmod +x android/gradlew

    # 构建 APK
    - name: Build APK
      run: flutter build apk --release  # 生成 release 版 APK

    # 上传 APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release.apk
        path: build/app/outputs/flutter-apk/app-release.apk  # Flutter 默认输出路径
